<script>
    const typewriterText = document.getElementById("typewriter-text");
    const texts = ["Welcome To My Blog Page!", "Below Are My Top Active Blog Areas! (Stay Tuned: More To Come!)"]; 
    let textIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    let typingSpeed = 50;
    let erasingSpeed = 50; 
    let delayBeforeTyping = 1000;
    function type() {
        const currentText = texts[textIndex];
        if (isDeleting) {
            typewriterText.textContent = currentText.slice(0, charIndex - 1);
            charIndex--;
            if (charIndex === 0) {
                isDeleting = false;
                textIndex++;
                if (textIndex === texts.length) {
                    textIndex = 0;
                }
                setTimeout(type, delayBeforeTyping);
            } else {
                setTimeout(type, erasingSpeed);
            }
        } else {
            typewriterText.textContent = currentText.slice(0, charIndex + 1);
            charIndex++;
            if (charIndex === currentText.length) {
                isDeleting = true;
                setTimeout(type, delayBeforeTyping);
            } else {
                setTimeout(type, typingSpeed);
            }
        }
    }
    setTimeout(type, delayBeforeTyping);
</script>
